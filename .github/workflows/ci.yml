name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - uses: cachix/cachix-action@v15
        with:
          name: hugefiver
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check flake
        run: nix flake check --no-build

      - name: Build default package
        run: nix build .#packages.x86_64-linux.default

      - name: Build network test variant
        run: nix build .#checks.x86_64-linux.net-test

      - name: Build dual-layer test variant
        run: nix build .#checks.x86_64-linux.dual-layer-test

  ironclaw:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - uses: cachix/cachix-action@v15
        with:
          name: hugefiver
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ironclaw (latest)
        run: nix build .#packages.x86_64-linux.ironclaw --print-build-logs

      - name: Build ironclaw-sandbox (latest)
        run: nix build .#packages.x86_64-linux.ironclaw-sandbox --print-build-logs

      - name: Run ironclaw-test smoke
        run: bash tests/test_ironclaw.sh ./result/bin/ocsb-ironclaw

  ironclaw-versions:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        version: [v0_25_0, v0_24_0]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - uses: cachix/cachix-action@v15
        with:
          name: hugefiver
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ironclaw_${{ matrix.version }}
        run: nix build .#packages.x86_64-linux.ironclaw_${{ matrix.version }} --print-build-logs
