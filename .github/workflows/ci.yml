name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') && secrets.CACHIX_AUTH_TOKEN || '' }}
      OCSB_BWRAP_FD_SOURCES: '1'
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        continue-on-error: true
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          upload-chunk-size: 67108864

      - name: Check flake
        run: nix flake check --no-build

      - name: Hermes source assertions
        run: |
          set -euo pipefail
          bash tests/test_hermes_agent.sh --source-only

      - name: Hermes gateway reservation fixture
        run: |
          set -euo pipefail
          HERMES_GATEWAY=$(bash tests/test_hermes_agent.sh --build-service-fixture "$RUNNER_TEMP/hermes-gateway")
          bash tests/test_hermes_agent.sh --case gateway-reservation "$HERMES_GATEWAY"

      - name: Hermes dead-candidate fixture
        run: |
          set -euo pipefail
          HERMES_DEAD_CANDIDATE=$(bash tests/test_hermes_agent.sh --build-service-fixture "$RUNNER_TEMP/hermes-dead-candidate")
          bash tests/test_hermes_agent.sh --case gateway-dead-candidate "$HERMES_DEAD_CANDIDATE"

      - name: Hermes replace identity fixture
        run: |
          set -euo pipefail
          HERMES_REPLACE=$(bash tests/test_hermes_agent.sh --build-lightweight-wrapper "$RUNNER_TEMP/hermes-replace")
          bash tests/test_hermes_agent.sh --case replace-identity "$HERMES_REPLACE"

      - name: Hermes caller-file secret fixture
        run: |
          set -euo pipefail
          HERMES_CALLER_FILE=$(bash tests/test_hermes_agent.sh --build-lightweight-wrapper "$RUNNER_TEMP/hermes-caller-file")
          bash tests/test_hermes_agent.sh --case caller-file-secret "$HERMES_CALLER_FILE"

      - name: Ironclaw source assertions
        run: |
          set -euo pipefail
          bash tests/test_ironclaw.sh --source-only

      - name: Ironclaw sidecar security fixture
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/ironclaw-sidecar-security.log"
          IRONCLAW_SIDECAR=$(bash tests/test_ironclaw.sh --build-lightweight-wrapper "$RUNNER_TEMP/ironclaw-sidecar")
          {
            printf 'IRONCLAW_SIDECAR=%s\n' "$IRONCLAW_SIDECAR"
            timeout 240s bash tests/test_ironclaw.sh --case sidecar-security "$IRONCLAW_SIDECAR"
          } > >(tee "$LOG") 2>&1 || {
            rc=$?
            printf '::error file=tests/test_ironclaw.sh::Ironclaw sidecar security fixture failed (exit=%s)\n' "$rc"
            tail -40 "$LOG" 2>/dev/null | while IFS= read -r line; do
              line="''${line//'%'/'%25'}"
              line="''${line//$'\r'/'%0D'}"
              printf '::error file=tests/test_ironclaw.sh::%s\n' "$line"
            done
            exit "$rc"
          }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ironclaw-sidecar-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ironclaw-sidecar-security.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Ironclaw master-key fixture
        run: |
          set -euo pipefail
          IRONCLAW_KEY=$(bash tests/test_ironclaw.sh --build-key-fixture "$RUNNER_TEMP/ironclaw-key")
          bash tests/test_ironclaw.sh --case master-key-window "$IRONCLAW_KEY"

      - name: Build default package for runtime suites
        run: |
          set -euo pipefail
          DEFAULT_OUT="$RUNNER_TEMP/ocsb-default"
          nix build --out-link "$DEFAULT_OUT" .#packages.x86_64-linux.default
          printf 'DEFAULT_OUT=%s\n' "$DEFAULT_OUT" >> "$GITHUB_ENV"

      - name: Probe real bwrap runtime capability
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/wrapper-bwrap-probe.log"
          set +e
          env -u XDG_RUNTIME_DIR "$DEFAULT_OUT/bin/ocsb" \
            -w ci-bwrap-probe --strategy direct --overwrite -- -c true \
            >"$LOG" 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            printf 'BWRAP_RUNTIME_AVAILABLE=1\n' >> "$GITHUB_ENV"
          elif grep -Eq 'setting up uid map|user namespace|Operation not permitted|Permission denied' "$LOG"; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            printf 'BWRAP_RUNTIME_AVAILABLE=0\n' >> "$GITHUB_ENV"
          else
            cat "$LOG" >&2
            exit "$rc"
          fi

      - name: Wrapper runtime suite
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/wrapper-runtime.log"
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n' | tee "$LOG"
            exit 0
          fi
          set +e
          env -u XDG_RUNTIME_DIR bash tests/test_wrapper.sh "$DEFAULT_OUT/bin/ocsb" 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            SUMMARY="$RUNNER_TEMP/wrapper-runtime-summary.log"
            {
              printf 'wrapper runtime exit=%s\n' "$rc"
              printf '%s\n' '--- focused failure lines ---'
              grep -E '(^[[:space:]]*FAIL|FAIL\[|ERROR|error|timed out|ocsb:)' "$LOG" || true
              printf '%s\n' '--- filtered tail ---'
              grep -Ev '^(copying path|warning: unknown setting)' "$LOG" | tail -160
            } > "$SUMMARY"
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$SUMMARY")
            printf '::error title=Wrapper runtime suite compact::%s\n' "$msg"
            exit "$rc"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: wrapper-runtime-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/wrapper-runtime.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Wrapper runtime pidfile fixture
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          env -u XDG_RUNTIME_DIR bash tests/test_wrapper.sh "$DEFAULT_OUT/bin/ocsb" --case runtime-pidfile-clobber

      - name: Backend runtime suite
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          bash tests/test_backend.sh .

      - name: Backend process record fixture
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/backend-process-record.log"
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n' | tee "$LOG"
            exit 0
          fi
          set +e
          bash tests/test_backend.sh . --case process-record-schema 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Backend process record fixture compact::%s\n' "$msg"
            exit "$rc"
          fi

      - name: Backend container rootfs fixture
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          LOG="$RUNNER_TEMP/backend-container-rootfs.log"
          set +e
          bash tests/test_backend.sh . --case container-rootfs-persistence 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Backend container rootfs fixture compact::%s\n' "$msg"
            exit "$rc"
          fi

      - name: Backend generic daemon fixture
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          bash tests/test_backend.sh . --case generic-daemon-pip

      - name: Binpath runtime suite
        run: |
          set -euo pipefail
          bash tests/test_binpath.sh .

      - name: Git worktree runtime suite
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          env -u XDG_RUNTIME_DIR bash tests/test_git_worktree.sh "$DEFAULT_OUT/bin/ocsb"

      - name: Btrfs runtime suite
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          env -u XDG_RUNTIME_DIR bash tests/test_btrfs.sh "$DEFAULT_OUT/bin/ocsb"

      - name: Run dual-layer runtime suites
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          DUAL_OUT="$RUNNER_TEMP/ocsb-dual-default"
          DUAL_HOME_OUT="$RUNNER_TEMP/ocsb-dual-home"
          nix build --out-link "$DUAL_OUT" .#checks.x86_64-linux.dual-layer-test
          nix build --out-link "$DUAL_HOME_OUT" .#checks.x86_64-linux.dual-layer-home-test
          env -u XDG_RUNTIME_DIR bash tests/test_dual_layer_host.sh green-env "$DUAL_OUT/bin/ocsb-dual-test"
          env -u XDG_RUNTIME_DIR bash tests/test_dual_layer_host.sh green-sandboxdir "$DUAL_HOME_OUT/bin/ocsb-dual-home-test"

      - name: Run deterministic runtime suites
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" = 1 ]; then
            export OCSB_BWRAP_FD_SOURCES=0
            env -u XDG_RUNTIME_DIR bash tests/test_mount_anchor.sh --ci-fake
            env -u XDG_RUNTIME_DIR bash tests/test_filtered_cleanup.sh --ci-fake
          else
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
          fi
          bash tests/test_ci_runtime.sh

      - name: Run architecture and failure-propagation contracts
        run: |
          set -euo pipefail
          DEFAULT_OUT="$RUNNER_TEMP/ocsb-default-arch"
          nix build --out-link "$DEFAULT_OUT" .#packages.x86_64-linux.default
          AARCH_JSON="$RUNNER_TEMP/aarch64-attrs.json"
          X86_JSON="$RUNNER_TEMP/x86_64-attrs.json"
          nix eval --impure --json .#packages.aarch64-linux --apply builtins.attrNames > "$AARCH_JSON"
          nix eval --impure --json .#packages.x86_64-linux --apply builtins.attrNames > "$X86_JSON"
          bash tests/test_arch_outputs.sh "$AARCH_JSON" "$X86_JSON"
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" = 1 ]; then
            FAILURE_DELEGATE=$(bash tests/test_failure_propagation.sh --prepare "$RUNNER_TEMP/failure-fixture" "$DEFAULT_OUT/bin/ocsb")
            env -u XDG_RUNTIME_DIR bash tests/test_failure_propagation.sh --case strategy-create "$FAILURE_DELEGATE"
          else
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
          fi

      - name: Run capability-based network suite
        run: |
          set -euo pipefail
          if [ "${BWRAP_RUNTIME_AVAILABLE:-0}" != 1 ]; then
            printf 'SKIP[CI-REQUIRED-wrapper-real-bwrap]: user namespace mapping unavailable\n'
            exit 0
          fi
          NET_OUT="$RUNNER_TEMP/ocsb-net-test"
          nix build --out-link "$NET_OUT" .#checks.x86_64-linux.net-test
          env -u XDG_RUNTIME_DIR bash tests/test_filtered_cleanup.sh --case real-secondary "$NET_OUT/bin/ocsb-net-test"

  podman-anchor-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a
      - name: Verify real rootless Podman mount anchoring
        run: |
          set -euo pipefail
          set +e
          nix develop .#backend-test -c bash -c '
            set -euo pipefail
            LOG="$RUNNER_TEMP/14-real-podman-green.log"
            trap '\''rc=$?; printf "podman-anchor failed rc=%s\n" "$rc" | tee -a "$LOG"; exit "$rc"'\'' ERR
            PODMAN_BIN=$(command -v podman)
            case "$PODMAN_BIN" in /nix/store/*/bin/podman) ;; *) printf "unexpected podman: %s\n" "$PODMAN_BIN" >&2; exit 1 ;; esac
            printf "PODMAN_BIN=%s\n" "$PODMAN_BIN" | tee "$LOG"
            podman --remote=false --version | tee -a "$LOG"
            PODMAN_ROOTLESS=$(podman --remote=false info --format "{{.Host.Security.Rootless}}" 2>&1) || {
              printf "PODMAN_INFO_ERROR=%s\n" "$PODMAN_ROOTLESS" | tee -a "$LOG"
              printf 'PENDING[CI-REQUIRED-real-podman-anchor]: rootless podman unavailable\n' | tee -a "$LOG"
              exit 0
            }
            printf "PODMAN_ROOTLESS=%s\n" "$PODMAN_ROOTLESS" | tee -a "$LOG"
            if [ "$PODMAN_ROOTLESS" != true ]; then
              printf 'PENDING[CI-REQUIRED-real-podman-anchor]: rootless podman unavailable\n' | tee -a "$LOG"
              exit 0
            fi
            HOST_UID=$(id -u)
            OUT="$RUNNER_TEMP/ocsb-podman-anchor"
            nix build --out-link "$OUT" .#packages.x86_64-linux.default
            env -u XDG_RUNTIME_DIR bash tests/test_mount_anchor.sh \
              --case real-rootless-podman "$OUT/bin/ocsb" \
              | tee -a "$LOG"
            grep -Fq "PASS[GREEN-real-rootless-podman-anchor]: uid=$HOST_UID source=original" \
              "$LOG"
          '
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            LOG="$RUNNER_TEMP/14-real-podman-green.log"
            if [ ! -e "$LOG" ]; then printf 'podman-anchor failed before log creation rc=%s\n' "$rc" > "$LOG"; fi
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Podman anchor compact::%s\n' "$msg"
            exit "$rc"
          fi
          if grep -Fq 'PENDING[CI-REQUIRED-real-podman-anchor]' "$RUNNER_TEMP/14-real-podman-green.log"; then
            exit 0
          elif ! grep -Fq 'PASS[GREEN-real-rootless-podman-anchor]' "$RUNNER_TEMP/14-real-podman-green.log"; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$RUNNER_TEMP/14-real-podman-green.log")
            printf '::error title=Podman anchor compact::%s\n' "$msg"
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: rootless-podman-anchor-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/14-real-podman-green.log
          if-no-files-found: error
          retention-days: 14

  podman-sidecar-lifecycle-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a
      - name: Verify native rootless Podman sidecar lifecycle
        run: |
          set -euo pipefail
          set +e
          nix develop .#backend-test -c bash -c '
            set -euo pipefail
            IMAGE=docker.io/pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
            LOG="$RUNNER_TEMP/19-native-podman-sidecar-green.log"
            trap '\''rc=$?; printf "native podman sidecar failed rc=%s\n" "$rc" | tee -a "$LOG"; exit "$rc"'\'' ERR
            PODMAN_BIN=$(command -v podman)
            case "$PODMAN_BIN" in /nix/store/*/bin/podman) ;; *) printf "unexpected podman: %s\n" "$PODMAN_BIN" >&2; exit 1 ;; esac
            podman --remote=false --version | tee "$LOG"
            PODMAN_ROOTLESS=$(podman --remote=false info --format "{{.Host.Security.Rootless}}" 2>&1) || {
              printf "PODMAN_INFO_ERROR=%s\n" "$PODMAN_ROOTLESS" | tee -a "$LOG"
              printf 'PENDING[CI-REQUIRED-native-podman-sidecar]: rootless podman unavailable\n' | tee -a "$LOG"
              exit 0
            }
            printf "PODMAN_ROOTLESS=%s\n" "$PODMAN_ROOTLESS" | tee -a "$LOG"
            if [ "$PODMAN_ROOTLESS" != true ]; then
              printf 'PENDING[CI-REQUIRED-native-podman-sidecar]: rootless podman unavailable\n' | tee -a "$LOG"
              exit 0
            fi
            podman --remote=false pull "$IMAGE"
            IMAGE_ID=$(podman --remote=false image inspect "$IMAGE" --format "{{.Id}}")
            REPODIGESTS=$(podman --remote=false image inspect "$IMAGE" --format "{{json .RepoDigests}}")
            test -n "$IMAGE_ID"
            printf "%s" "$REPODIGESTS" | grep -Fq "sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0"
            printf "%s\n" "PINNED_IMAGE_RUNTIME=podman" "PINNED_IMAGE_REQUEST=$IMAGE" "PINNED_IMAGE_ID=$IMAGE_ID" "PINNED_IMAGE_REPODIGESTS=$REPODIGESTS" > "$LOG"
            WRAPPER=$(bash tests/test_ironclaw.sh --build-lightweight-wrapper "$RUNNER_TEMP/native-podman-wrapper")
            OCSB_NATIVE_PODMAN_REQUIRED=1 bash tests/test_ironclaw.sh --case native-sidecar-lifecycle podman "$WRAPPER" | tee -a "$LOG"
            grep -Fq "PASS[GREEN-sidecar-native-podman-lifecycle]: pull-provenance create-exit-inspect-stop-once-restart-inspect-running-reuse-same-id no-second-stop prepare-decision-ack bare-entrypoint-argv-env" "$LOG"
            grep -Fq "CLEANUP PASS: native podman sidecar container processes persist cidfiles fifos outlinks mounts removed" "$LOG"
          '
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            LOG="$RUNNER_TEMP/19-native-podman-sidecar-green.log"
            if [ ! -e "$LOG" ]; then printf 'native podman sidecar failed before log creation rc=%s\n' "$rc" > "$LOG"; fi
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Native Podman sidecar compact::%s\n' "$msg"
            exit "$rc"
          fi
          if grep -Fq 'PENDING[CI-REQUIRED-native-podman-sidecar]' "$RUNNER_TEMP/19-native-podman-sidecar-green.log"; then
            exit 0
          elif ! grep -Fq 'PASS[GREEN-sidecar-native-podman-lifecycle]' "$RUNNER_TEMP/19-native-podman-sidecar-green.log"; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$RUNNER_TEMP/19-native-podman-sidecar-green.log")
            printf '::error title=Native Podman sidecar compact::%s\n' "$msg"
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: final-review-podman-sidecar-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/19-native-podman-sidecar-green.log
          if-no-files-found: error
          retention-days: 14

  docker-sidecar-lifecycle-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a
      - name: Verify native Docker sidecar lifecycle
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/19-native-docker-sidecar-green.log"
          : > "$LOG"
          trap 'rc=$?; printf "native docker sidecar failed rc=%s\n" "$rc" | tee -a "$LOG"; exit "$rc"' ERR
          set +e
          DOCKER_BIN=$(command -v docker)
          printf 'DOCKER_BIN=%s\n' "$DOCKER_BIN" | tee -a "$LOG"
          case "$DOCKER_BIN" in /usr/bin/docker|/bin/docker|*/docker) ;; *) printf "unexpected docker: %s\n" "$DOCKER_BIN" >&2; exit 1 ;; esac
          docker version --format '{{.Server.Version}}' 2>&1 | sed 's/^/DOCKER_SERVER_VERSION=/' | tee -a "$LOG"
          if ! docker info 2>&1 | sed -n '1,80p' | tee -a "$LOG" >/dev/null; then
            printf 'PENDING[CI-REQUIRED-native-docker-sidecar]: local docker unavailable\n' | tee -a "$LOG"
            exit 0
          fi
          ENDPOINT=$(docker context inspect --format '{{(index .Endpoints "docker").Host}}')
          printf 'DOCKER_ENDPOINT=%s\n' "$ENDPOINT" | tee -a "$LOG"
          case "$ENDPOINT" in unix://*) ;; *) printf 'non-local Docker endpoint: %s\n' "$ENDPOINT" >&2; exit 1 ;; esac
          IMAGE=docker.io/pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
          docker pull "$IMAGE"
          IMAGE_ID=$(docker image inspect "$IMAGE" --format '{{.Id}}')
          REPODIGESTS=$(docker image inspect "$IMAGE" --format '{{json .RepoDigests}}')
          test -n "$IMAGE_ID"
          printf '%s' "$REPODIGESTS" | grep -Fq 'sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0'
          printf '%s\n' "PINNED_IMAGE_RUNTIME=docker" "PINNED_IMAGE_REQUEST=$IMAGE" "PINNED_IMAGE_ID=$IMAGE_ID" "PINNED_IMAGE_REPODIGESTS=$REPODIGESTS" > "$LOG"
          WRAPPER=$(bash tests/test_ironclaw.sh --build-lightweight-wrapper "$RUNNER_TEMP/native-docker-wrapper")
          OCSB_NATIVE_DOCKER_REQUIRED=1 bash tests/test_ironclaw.sh --case native-sidecar-lifecycle docker "$WRAPPER" | tee -a "$LOG"
          grep -Fq 'PASS[GREEN-sidecar-native-docker-lifecycle]: pull-provenance create-exit-inspect-stop-once-restart-inspect-running-reuse-same-id no-second-stop prepare-decision-ack bare-entrypoint-argv-env' "$LOG"
          grep -Fq 'CLEANUP PASS: native docker sidecar container processes persist cidfiles fifos outlinks mounts removed' "$LOG"
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            if [ ! -e "$LOG" ]; then printf 'native docker sidecar failed before log creation rc=%s\n' "$rc" > "$LOG"; fi
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Native Docker sidecar compact::%s\n' "$msg"
            exit "$rc"
          fi
          if grep -Fq 'PENDING[CI-REQUIRED-native-docker-sidecar]' "$LOG"; then
            exit 0
          elif ! grep -Fq 'PASS[GREEN-sidecar-native-docker-lifecycle]' "$LOG"; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Native Docker sidecar compact::%s\n' "$msg"
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: final-review-docker-sidecar-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/19-native-docker-sidecar-green.log
          if-no-files-found: error
          retention-days: 14

  hermes-build:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 120
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: hermes-build-${{ github.sha }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        continue-on-error: true
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          upload-chunk-size: 67108864

      - name: Build and test hermes-agent-sandbox
        id: hermes
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/hermes-build.log"
          HERMES_OUT="$RUNNER_TEMP/hermes-agent-sandbox"
          set +e
          nix build --print-build-logs --out-link "$HERMES_OUT" .#packages.x86_64-linux.hermes-agent-sandbox 2>&1 | tee "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Hermes build compact::%s\n' "$msg"
            exit "$rc"
          fi
          echo "path=$HERMES_OUT" >> "$GITHUB_OUTPUT"
          if ! "$HERMES_OUT/bin/ocsb-hermes" --help >/dev/null 2>&1; then
            printf 'SKIP[CI-REQUIRED-hermes-real-bwrap]: userns or RTM_NEWADDR unavailable\n' | tee -a "$LOG"
            exit 0
          fi
          set +e
          env -u XDG_RUNTIME_DIR bash tests/test_hermes_agent.sh "$HERMES_OUT/bin/ocsb-hermes" 2>&1 | tee -a "$LOG"
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            msg=$(python3 -c 'import sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(errors="replace")[-12000:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$LOG")
            printf '::error title=Hermes wrapper compact::%s\n' "$msg"
            exit "$rc"
          fi

      - name: Push to cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        run: nix path-info --recursive '${{ steps.hermes.outputs.path }}' | cachix push hugefiver

  ironclaw-build:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 120
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: ironclaw-build-${{ github.sha }}-${{ matrix.version }}-${{ matrix.arch }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        version: [v0_29_0, v0_28_2]
        arch: ['', x86_64_v3]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        continue-on-error: true
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          upload-chunk-size: 67108864

      - name: Compute attribute suffix
        id: attr
        run: |
          if [ -z "${{ matrix.arch }}" ]; then
            echo "suffix=${{ matrix.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ matrix.version }}_${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Ironclaw application and wrapper
        id: ironclaw
        run: |
          set -euo pipefail
          IRONCLAW_OUT="$RUNNER_TEMP/ironclaw-${{ steps.attr.outputs.suffix }}"
          IRONCLAW_SANDBOX_OUT="$RUNNER_TEMP/ironclaw-sandbox-${{ steps.attr.outputs.suffix }}"
          nix build --print-build-logs --out-link "$IRONCLAW_OUT" .#packages.x86_64-linux.ironclaw_${{ steps.attr.outputs.suffix }}
          nix build --print-build-logs --out-link "$IRONCLAW_SANDBOX_OUT" .#packages.x86_64-linux.ironclaw-sandbox_${{ steps.attr.outputs.suffix }}
          echo "package=$IRONCLAW_OUT" >> "$GITHUB_OUTPUT"
          echo "sandbox=$IRONCLAW_SANDBOX_OUT" >> "$GITHUB_OUTPUT"

      - name: Push to cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        run: |
          nix path-info --recursive \
            '${{ steps.ironclaw.outputs.package }}' \
            '${{ steps.ironclaw.outputs.sandbox }}' \
            | cachix push hugefiver

  ironclaw-test:
    runs-on: ubuntu-latest
    needs: [build, ironclaw-build]
    timeout-minutes: 30
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: ironclaw-test-${{ github.sha }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'
          pushFilter: ".*"

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        continue-on-error: true
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          upload-chunk-size: 67108864

      - name: Build latest Ironclaw wrapper from cache and run real suite
        run: |
          set -euo pipefail
          IRONCLAW_OUT="$RUNNER_TEMP/ironclaw-sandbox-latest"
          nix build --print-build-logs --out-link "$IRONCLAW_OUT" .#packages.x86_64-linux.ironclaw-sandbox
          if ! "$IRONCLAW_OUT/bin/ocsb-ironclaw" --help >/dev/null 2>&1; then
            printf 'SKIP[CI-REQUIRED-ironclaw-real-bwrap]: userns or RTM_NEWADDR unavailable\n'
            exit 0
          fi
          env -u XDG_RUNTIME_DIR bash tests/test_ironclaw.sh "$IRONCLAW_OUT/bin/ocsb-ironclaw"
