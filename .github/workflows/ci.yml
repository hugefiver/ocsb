name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') && secrets.CACHIX_AUTH_TOKEN || '' }}
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        continue-on-error: true

      - name: Check flake
        run: nix flake check --no-build

      - name: Build default package
        run: nix build .#packages.x86_64-linux.default

      - name: Build network test variant
        run: nix build .#checks.x86_64-linux.net-test

      - name: Build dual-layer test variant
        run: nix build .#checks.x86_64-linux.dual-layer-test

  hermes-build:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 120
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: hermes-build-${{ github.sha }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        continue-on-error: true

      - name: Build hermes-agent-sandbox
        run: nix build .#packages.x86_64-linux.hermes-agent-sandbox --print-build-logs

      - name: Push to cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        run: |
          nix path-info --recursive ./result | cachix push hugefiver

  ironclaw-build:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 120
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: ironclaw-build-${{ github.sha }}-${{ matrix.version }}-${{ matrix.arch }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        version: [v0_28_2, v0_28_1, v0_27_0]
        arch: ['', x86_64_v3]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        continue-on-error: true

      - name: Compute attribute suffix
        id: attr
        run: |
          if [ -z "${{ matrix.arch }}" ]; then
            echo "suffix=${{ matrix.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ matrix.version }}_${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ironclaw_${{ steps.attr.outputs.suffix }}
        run: nix build .#packages.x86_64-linux.ironclaw_${{ steps.attr.outputs.suffix }} --print-build-logs

      - name: Build ironclaw-sandbox_${{ steps.attr.outputs.suffix }}
        run: nix build .#packages.x86_64-linux.ironclaw-sandbox_${{ steps.attr.outputs.suffix }} --print-build-logs

      - name: Push to cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        run: |
          nix path-info --recursive ./result | cachix push hugefiver

  ironclaw-test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    concurrency:
      group: ironclaw-test-${{ github.sha }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a

      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc
        with:
          name: hugefiver
          authToken: '${{ env.CACHIX_AUTH_TOKEN }}'
          pushFilter: ".*"

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        continue-on-error: true

      - name: Build ironclaw-sandbox (latest baseline, from cache)
        run: nix build .#packages.x86_64-linux.ironclaw-sandbox --print-build-logs

      - name: Run ironclaw smoke test
        run: bash tests/test_ironclaw.sh ./result/bin/ocsb-ironclaw
